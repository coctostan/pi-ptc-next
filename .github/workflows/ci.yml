name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    name: Verify release baseline
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ast-grep CLI
        run: npm install -g @ast-grep/cli

      - name: Clone and install pi-hashline-readmap as sibling repo
        run: |
          git clone --depth 1 --branch v0.8.6 https://github.com/coctostan/pi-hashline-readmap.git ../pi-hashline-readmap \
            || git clone --depth 1 https://github.com/coctostan/pi-hashline-readmap.git ../pi-hashline-readmap
          (cd ../pi-hashline-readmap && npm install --no-audit --no-fund)
          echo "PI_HASHLINE_READMAP_ROOT=$GITHUB_WORKSPACE/../pi-hashline-readmap" >> "$GITHUB_ENV"

      - name: Run repo verification suite
        run: npm run verify:ci
