name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    name: Verify release baseline
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ast-grep CLI
        run: npm install -g @ast-grep/cli

      - name: Install pi-hashline-readmap
        run: |
          npm install -g pi-hashline-readmap@^0.8.6
          echo "PI_HASHLINE_READMAP_ROOT=$(npm root -g)/pi-hashline-readmap" >> "$GITHUB_ENV"

      - name: Run repo verification suite
        run: npm run verify:ci
